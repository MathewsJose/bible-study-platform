version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bible-php
    container_name: bible-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - 8000:8000
    depends_on:
      - mongo
      - elasticsearch
    networks:
      bible-net:
        aliases:
          - app

  mongo:
    image: mongo:6.0
    container_name: bible-mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - bible-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    container_name: bible-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - 9200:9200
    networks:
      - bible-net

  nginx:
    image: nginx:latest
    container_name: bible-nginx
    ports:
      - 80:80
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bible-net

volumes:
  mongo-data:

networks:
  bible-net:
    driver: bridge
