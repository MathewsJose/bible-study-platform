services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bible-php
    container_name: bible-app
    working_dir: /var/www
    command: >
      sh -c "mkdir -p
      /var/www/storage/framework/cache/data
      /var/www/storage/framework/sessions
      /var/www/storage/framework/views
      /var/www/bootstrap/cache
      && php-fpm"
    volumes:
      - ./:/var/www
    expose:
      - "9000"
    depends_on:
      - mongo
    networks:
      bible-net:
        aliases:
          - app

  mongo:
    image: mongo:6.0
    container_name: bible-mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - bible-net  

  nginx:
    image: nginx:latest
    container_name: bible-nginx
    ports:
      - 80:80
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bible-net

volumes:
  mongo-data:

networks:
  bible-net:
    driver: bridge
