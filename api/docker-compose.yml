services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bible-php
    container_name: bible-app
    working_dir: /var/www
    command: >
      sh -c "mkdir -p
      /var/www/storage/framework/cache/data
      /var/www/storage/framework/sessions
      /var/www/storage/framework/views
      /var/www/bootstrap/cache
      && chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache || true
      && chmod -R 777 /var/www/storage /var/www/bootstrap/cache
      && php-fpm"
    volumes:
      - ./:/var/www
      - storage-data:/var/www/storage
    environment:
      - CACHE_DRIVER=array
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=bible_auth
      - DB_USERNAME=app
      - DB_PASSWORD=secret
    expose:
      - "9000"
    depends_on:
      - mongo
      - mysql
    networks:
      bible-net:
        aliases:
          - app

  mongo:
    image: mongo:6.0
    container_name: bible-mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - bible-net  

  mysql:
    image: mariadb:11.2
    container_name: bible-mysql
    ports:
      - 3306:3306
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=bible_auth
      - MARIADB_USER=app
      - MARIADB_PASSWORD=secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bible-net

  nginx:
    image: nginx:latest
    container_name: bible-nginx
    ports:
      - 80:80
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bible-net

volumes:
  mongo-data:
  storage-data:
  mysql-data:

networks:
  bible-net:
    driver: bridge
