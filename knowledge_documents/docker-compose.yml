services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-knowledge_service}
      DB_USERNAME: ${DB_USERNAME:-knowledge}
      DB_PASSWORD: ${DB_PASSWORD:-knowledge_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
      OPENAI_RETRY_ATTEMPTS: ${OPENAI_RETRY_ATTEMPTS:-3}
      OPENAI_RETRY_SLEEP_MS: ${OPENAI_RETRY_SLEEP_MS:-200}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - knowledge

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - knowledge

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${DB_DATABASE:-knowledge_service}
      POSTGRES_USER: ${DB_USERNAME:-knowledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-knowledge_secret}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-knowledge} -d ${DB_DATABASE:-knowledge_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - knowledge

  pgadmin:
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_secret}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - knowledge

volumes:
  postgres-data:
  pgadmin-data:

networks:
  knowledge:
    driver: bridge
